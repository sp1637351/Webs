        let countdownTimer;

        function startSearch() {
            let phoneInput = document.getElementById("phone");
            let searchBtn = document.getElementById("searchBtn");
            
            let phone = phoneInput.value.replace(/ /g, "").trim();
            let resultDiv = document.getElementById("resultBox");
            let loadingBox = document.getElementById("loadingBox");
            let timerSpan = document.getElementById("timer";

            // Auto formatting
            if (!phone.startsWith("+91") && phone.length === 10) {
                phone = "+91" + phone;
            } else if (!phone.startsWith("+") && phone.length > 10) {
                phone = "+" + phone;
            }

            if (!phone) {
                resultDiv.style.display = "block";
                resultDiv.style.animation = "slideDownData 0.5s ease-out";
                resultDiv.innerHTML = "<span style='color: #FF6347;'>вќЊ Please enter a mobile number!</span>";
                return;
            }

            // вљ пёЏ SEARCH LOCK: Disable Input and Button so user cannot search again
            phoneInput.disabled = true;
            searchBtn.disabled = true;
            searchBtn.innerText = "рџ”’ Trial Used";

            // Hide previous result & Show Loading Box
            resultDiv.style.display = "none";
            loadingBox.style.display = "block";
            
            if (countdownTimer) clearInterval(countdownTimer);

            let timeLeft = 5;
            timerSpan.innerText = timeLeft;

            countdownTimer = setInterval(function() {
                timeLeft--;
                timerSpan.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    showData(phone);
                }
            }, 1000);
        }
